<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <title>乡创OS - 中国乡村的AI操作系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        var endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        var websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (
          endpoint &&
          endpoint !== "%" + "VITE_ANALYTICS_ENDPOINT" + "%" &&
          websiteId &&
          websiteId !== "%" + "VITE_ANALYTICS_WEBSITE_ID" + "%"
        ) {
          var script = document.createElement("script");
          script.defer = true;
          script.src = endpoint + "/umami";
          script.setAttribute("data-website-id", websiteId);
          document.head.appendChild(script);
        }
      })();
    </script>
  </body>
</html>
